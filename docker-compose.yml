services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-18080}:8080"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_NAME: ${APP_NAME:-Relevance Gateway}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me-super-secret}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-RmyZ4rXrN-WcQeQ9hLZ2Nvhxy4N9POsXQJ5F5FtmQ1c=}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/gateway.db}
      ENABLE_BUFFERED_STREAM_COMPAT: ${ENABLE_BUFFERED_STREAM_COMPAT:-false}
      UPSTREAM_POLL_INTERVAL_SECONDS: ${UPSTREAM_POLL_INTERVAL_SECONDS:-1.5}
      UPSTREAM_POLL_TIMEOUT_SECONDS: ${UPSTREAM_POLL_TIMEOUT_SECONDS:-300}
      STREAM_HEARTBEAT_INTERVAL_SECONDS: ${STREAM_HEARTBEAT_INTERVAL_SECONDS:-8}
      TASK_METADATA_POLL_INTERVAL_SECONDS: ${TASK_METADATA_POLL_INTERVAL_SECONDS:-1}
      TASK_VIEW_POLL_INTERVAL_SECONDS: ${TASK_VIEW_POLL_INTERVAL_SECONDS:-1}
      STREAM_FALLBACK_INITIAL_SILENCE_SECONDS: ${STREAM_FALLBACK_INITIAL_SILENCE_SECONDS:-10}
      STREAM_FALLBACK_SILENCE_SECONDS: ${STREAM_FALLBACK_SILENCE_SECONDS:-5}
      STREAM_FALLBACK_SMOOTH_CHUNK_CHARS: ${STREAM_FALLBACK_SMOOTH_CHUNK_CHARS:-24}
      STREAM_FALLBACK_SMOOTH_CHUNK_DELAY_MS: ${STREAM_FALLBACK_SMOOTH_CHUNK_DELAY_MS:-25}
      MODEL_CATALOG_TTL_SECONDS: ${MODEL_CATALOG_TTL_SECONDS:-86400}
      MODEL_CATALOG_REFRESH_TIMEOUT_SECONDS: ${MODEL_CATALOG_REFRESH_TIMEOUT_SECONDS:-20}
      DEPLOYMENT_COOLDOWN_SECONDS: ${DEPLOYMENT_COOLDOWN_SECONDS:-30}
      DEBUG_RUNTIME: ${DEBUG_RUNTIME:-false}
      DEBUG_STREAM_PAYLOADS: ${DEBUG_STREAM_PAYLOADS:-false}
      DEBUG_STREAM_PAYLOAD_PREVIEW_CHARS: ${DEBUG_STREAM_PAYLOAD_PREVIEW_CHARS:-160}
      DEBUG_STREAM_STALL_WARNING_SECONDS: ${DEBUG_STREAM_STALL_WARNING_SECONDS:-15}
      DEBUG_STREAM_WATCHDOG_INTERVAL_SECONDS: ${DEBUG_STREAM_WATCHDOG_INTERVAL_SECONDS:-5}
    volumes:
      - ./data:/app/data
